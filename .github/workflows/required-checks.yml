name: Required Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      compose: ${{ steps.filter.outputs.compose }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'apps/**'
              - 'packages/**'
              - 'tests/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Makefile'
            compose:
              - 'apps/api/**'
              - 'apps/worker/**'
              - 'apps/telegram-bot/**'
              - 'packages/connectors/**'
              - 'packages/domain/**'
              - 'packages/llm/**'
              - 'packages/observability/**'
              - 'packages/orchestration/**'
              - 'packages/runtime/**'
              - 'packages/storage/**'
              - 'migrations/**'
              - 'docker-compose.yml'
              - 'Dockerfile'
              - 'alembic.ini'
              - 'scripts/compose-api-health-smoke.sh'
              - 'scripts/migrate.sh'

  python-checks:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.python == 'true'
    uses: ./.github/workflows/python-checks-reusable.yml

  compose-smoke:
    needs: detect-changes
    if: github.event_name == 'push' || needs.detect-changes.outputs.compose == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: API Health Smoke Check
        run: bash scripts/compose-api-health-smoke.sh
      - name: Compose logs (on failure)
        if: failure()
        run: docker compose logs --no-color --timestamps postgres api
      - name: Compose cleanup
        if: always()
        run: docker compose down --volumes --remove-orphans
