name: Required Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install deps
        run: uv sync --frozen --extra dev
      - name: Lint
        run: bash scripts/lint.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install deps
        run: uv sync --frozen --extra dev
      - name: Test
        run: bash scripts/test.sh

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: API Health Smoke Check
        run: bash scripts/compose-api-health-smoke.sh
      - name: Compose logs (on failure)
        if: failure()
        run: docker compose logs --no-color --timestamps postgres api
      - name: Compose cleanup
        if: always()
        run: docker compose down --volumes --remove-orphans
