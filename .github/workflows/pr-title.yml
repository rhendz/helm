name: PR Title Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name format
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          echo "Validating branch: $BRANCH_NAME"
          if [[ "$BRANCH_NAME" =~ ^ap/(feat|bug|chore)-[a-z0-9._-]+$ ]]; then
            echo "branch ok"
          else
            echo "Invalid branch format. Use one of:"
            echo "  ap/feat-short-description"
            echo "  ap/bug-short-description"
            echo "  ap/chore-short-description"
            exit 1
          fi

      - name: Validate title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Validating: $PR_TITLE"
          if [[ "$PR_TITLE" =~ ^(feat|bug|chore)(\([A-Za-z0-9._/-]+\))?:[[:space:]].+ ]]; then
            echo "ok"
          else
            echo "Invalid title format. Use: feat|bug|chore: <description>"
            exit 1
          fi
